<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ULTRA AI Dashboard</title>

<style>
body { background:#020617; color:white; font-family:Arial; }
table { width:100%; border-collapse:collapse; margin-top:20px;}
th, td { padding:8px; text-align:center; }
th { background:#0f172a; }
tr:nth-child(even){ background:#020617;}
.group { background:#1e293b; font-weight:bold;}
.best { background:#064e3b !important; }
.buy { color:#22c55e; font-weight:bold;}
.sell { color:#ef4444; font-weight:bold;}
.wait { color:#facc15; }
</style>

</head>

<body>

<h2>🚀 ULTRA AI Dashboard (Final)</h2>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>EMA20</th>
<th>EMA50</th>
<th>RSI</th>
<th>RR</th>
<th>Score</th>
<th>News</th>
<th>Signal</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>
const groups = {
"🚀 Growth": ["OKLO","RKLB","ASTS","PL","APLD","TSSI","CRWV","NVTS"],
"💾 Memory": ["STX","WDC","SNDK","MU"],
"🧠 AI": ["AMD","TSM","ARM","NBIS","ALAB","PLTR","CRCL"]
};

const newsNotes = {
"RKLB": "🟢 contract",
"ASTS": "🔴 delay",
"PLTR": "🟢 AI deal",
"MU": "🟢 earnings",
"ALAB": "🟢 AI infra",
"CRWV": "⚪",
"NVTS": "⚪"
};

function calcRSI(prices, period=14){
    let gains=0, losses=0;
    for(let i=1;i<=period;i++){
        let diff = prices[i]-prices[i-1];
        if(diff>=0) gains+=diff;
        else losses-=diff;
    }
    let rs = gains/(losses||1);
    return 100 - (100/(1+rs));
}

async function fetchData(symbol){
    try{
        const base = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=10d&interval=1h`;
        const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(base);

        const res = await fetch(url);
        const data = await res.json();

        if(!data.chart || !data.chart.result){
            throw new Error("No data");
        }

        let prices = data.chart.result[0].indicators.quote[0].close.filter(v=>v);

        if(prices.length < 20){
            throw new Error("Not enough data");
        }

        function ema(period){
            let k=2/(period+1);
            let e=[prices[0]];
            for(let i=1;i<prices.length;i++){
                e.push(prices[i]*k + e[i-1]*(1-k));
            }
            return e[e.length-1];
        }

        let price = prices.at(-1);
        let ema20 = ema(20);
        let ema50 = ema(50);

        let rsi = calcRSI(prices.slice(-15));
        let support = Math.min(...prices.slice(-20));
        let resistance = Math.max(...prices.slice(-20));

        let rr = (resistance-price) / Math.max((price-support), 0.01);

        let score=0;
        if(price>ema20) score+=2;
        if(ema20>ema50) score+=2;
        if(rr>2) score+=2;
        if(rsi>50 && rsi<70) score+=1;
        if(price>resistance*0.99) score+=1;

        let accScore=0;
        if(price>ema50) accScore+=2;
        if(rsi<65) accScore+=1;
        if(price<resistance*0.95) accScore+=1;

        if(["AMD","TSM","ARM","MU","WDC","STX","PLTR"].includes(symbol)){
            accScore += 2;
        }

        let note = newsNotes[symbol] || "⚪";

        if(note.includes("🔴")) score -= 2;
        if(note.includes("🟢")) score += 1;

        let signal="WAIT", cls="wait";

        if(score>=7 && accScore>=4){
            signal="🚀💎"; cls="buy";
        }
        else if(score>=7){
            signal="🚀"; cls="buy";
        }
        else if(accScore>=4){
            signal="💎";
        }
        else if(price<ema50){
            signal="SELL"; cls="sell";
        }

        return {symbol,price,ema20,ema50,rsi,rr,score,signal,cls,note};

    }catch(e){
        console.log("Error:", symbol, e);
        return {symbol, error:true};
    }
}

async function load(){
    let tb=document.getElementById("tb");
    tb.innerHTML="";

    for(let group in groups){

        let results = await Promise.all(groups[group].map(s => fetchData(s)));

        let strongCount = results.filter(x => x.signal && x.signal.includes("🚀")).length;

        tb.innerHTML += `
        <tr class="group">
            <td colspan="9">${group} (🚀 ${strongCount})</td>
        </tr>`;

        results = results.filter(x=>!x.error).sort((a,b)=>b.score-a.score);

        for(let d of results){
            tb.innerHTML += `
            <tr>
            <td>${d.symbol}</td>
            <td>${d.price.toFixed(2)}</td>
            <td>${d.ema20.toFixed(2)}</td>
            <td>${d.ema50.toFixed(2)}</td>
            <td>${d.rsi.toFixed(1)}</td>
            <td>${d.rr.toFixed(2)}</td>
            <td>${d.score}</td>
            <td>${d.note}</td>
            <td class="${d.cls}">${d.signal}</td>
            </tr>`;
        }
    }
}

load();
setInterval(load,60000);
</script>

</body>
</html>
